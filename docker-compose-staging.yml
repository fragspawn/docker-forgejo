services:
  db:
    image: mariadb:11
    container_name: forgejo-db
    restart: unless-stopped
    networks:
      - forgejo
    volumes:
      - mariadb-data:/var/lib/mysql
      - mariadb-sql:/docker-entrypoint-initdb.d
    environment:
      # --- Required ---
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-changeme-root}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-forgejo}
      MARIADB_USER: ${MARIADB_USER:-forgejo}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-changeme-forgejo}
      # --- Optional ---
      # MARIADB_AUTO_UPGRADE: "1"           # auto-upgrade on container start
      # MARIADB_INITDB_SKIP_TZINFO: "1"     # skip timezone table population
      # MARIADB_CHARACTER_SET: utf8mb4
      # MARIADB_COLLATION: utf8mb4_unicode_ci
      # TZ: America/New_York
    healthcheck:
      test:
        - "CMD"
        - "healthcheck.sh"
        - "--connect"
        - "--innodb_initialized"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  server:
    build:
      context: .
      dockerfile: staging.Dockerfile
    container_name: forgejo
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - forgejo
    volumes:
      - forgejo-data:/data
    entrypoint:
      - /bin/sh
      - /entrypoint.sh
    ports:
      - "7010:3000"   # HTTP web UI
      - "7222:22"     # SSH git access
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "--fail"
        - "--silent"
        - "--output"
        - "/dev/null"
        - "http://localhost:3000/"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    environment:
      # -----------------------------------------------------------------------
      # Container runtime
      # -----------------------------------------------------------------------
      USER_UID: "1000"
      USER_GID: "1000"

      # -----------------------------------------------------------------------
      # [DEFAULT] – Overall application settings
      # -----------------------------------------------------------------------
      FORGEJO____APP_NAME: "Forgejo"
      FORGEJO____APP_SLOGAN: "Beyond coding. We forge."
      FORGEJO____RUN_MODE: "prod"             # dev | prod
      FORGEJO____WORK_PATH: "/tmp"

      # -----------------------------------------------------------------------
      # [server] – HTTP / SSH listener
      # -----------------------------------------------------------------------
      FORGEJO__server__DOMAIN: ${FORGEJO__server__DOMAIN-localhost}
      FORGEJO__server__ROOT_URL: ${FORGEJO__server__ROOT_URL:-"http://localhost:3000/"}
      FORGEJO__server__HTTP_PORT: ${FORGEJO__server__HTTP_PORT-3000}
      FORGEJO__server__SSH_DOMAIN: ${FORGEJO__server__SSH_DOMAIN-localhost}
      FORGEJO__server__SSH_PORT: ${FORGEJO__server__SSH_PORT-22}
      FORGEJO__server__APP_DATA_PATH: ${FORGEJO__server__APP_DATA_PATH:-/data/gitea}
      # FORGEJO__server__PROTOCOL: "http"       # http | https | fcgi | http+unix | fcgi+unix
      # FORGEJO__server__HTTP_ADDR: "0.0.0.0"
      # FORGEJO__server__OFFLINE_MODE: "true"   # serve static assets locally
      # FORGEJO__server__DISABLE_SSH: "false"
      # FORGEJO__server__START_SSH_SERVER: "false"
      # FORGEJO__server__SSH_LISTEN_HOST: "0.0.0.0"
      # FORGEJO__server__SSH_LISTEN_PORT: "22"
      # FORGEJO__server__LFS_START_SERVER: "false"
      # FORGEJO__server__LFS_JWT_SECRET: ""     # generate: forgejo generate secret LFS_JWT_SECRET
      # FORGEJO__server__ENABLE_ACME: "false"
      # FORGEJO__server__ACME_URL: ""
      # FORGEJO__server__ACME_ACCEPTTOS: "false"
      # FORGEJO__server__ACME_EMAIL: ""
      # FORGEJO__server__CERT_FILE: "https/cert.pem"
      # FORGEJO__server__KEY_FILE: "https/key.pem"
      # FORGEJO__server__REDIRECT_OTHER_PORT: "false"
      # FORGEJO__server__PORT_TO_REDIRECT: "80"
      # FORGEJO__server__LANDING_PAGE: "home"   # home | explore | organizations | login
      # FORGEJO__server__ENABLE_GZIP: "false"
      # FORGEJO__server__ENABLE_PPROF: "false"
      # FORGEJO__server__STATIC_URL_PREFIX: ""

      # -----------------------------------------------------------------------
      # [database] – MariaDB connection
      # -----------------------------------------------------------------------
      FORGEJO__database__DB_TYPE: "mysql"
      FORGEJO__database__HOST: ${MARIADB_HOST:-db}
      FORGEJO__database__NAME: ${MARIADB_DATABASE:-forgejo}
      FORGEJO__database__USER: ${MARIADB_USER:-forgejo}
      FORGEJO__database__PASSWD: ${MARIADB_PASSWORD:-changeme-forgejo}
      # FORGEJO__database__SSL_MODE: "false"    # false | true | skip-verify | prefer
      # FORGEJO__database__CHARSET_COLLATION: ""
      # FORGEJO__database__LOG_SQL: "false"
      # FORGEJO__database__DB_RETRIES: "10"
      # FORGEJO__database__DB_RETRY_BACKOFF: "3s"
      # FORGEJO__database__MAX_OPEN_CONNS: "100"
      # FORGEJO__database__MAX_IDLE_CONNS: "2"
      # FORGEJO__database__CONN_MAX_LIFETIME: "3s"
      # FORGEJO__database__CONN_MAX_IDLETIME: "0"
      # FORGEJO__database__AUTO_MIGRATION: "true"
      # FORGEJO__database__SLOW_QUERY_THRESHOLD: "5s"

      # -----------------------------------------------------------------------
      # [security] – Secrets and access control
      # -----------------------------------------------------------------------
      FORGEJO__security__INSTALL_LOCK: "true"    # bypass install wizard; all config is set via env vars
      FORGEJO__security__SECRET_KEY: "changeme-secret-key-32bytes-here!"
      FORGEJO__security__INTERNAL_TOKEN: "changeme-internal-token"
      # FORGEJO__security__LOGIN_REMEMBER_DAYS: "31"
      # FORGEJO__security__PASSWORD_HASH_ALGO: "pbkdf2"
      # FORGEJO__security__MIN_PASSWORD_LENGTH: "8"
      # FORGEJO__security__PASSWORD_COMPLEXITY: "off"
      # FORGEJO__security__DISABLE_GIT_HOOKS: "true"
      # FORGEJO__security__DISABLE_WEBHOOKS: "false"
      # FORGEJO__security__REVERSE_PROXY_LIMIT: "1"
      # FORGEJO__security__REVERSE_PROXY_TRUSTED_PROXIES: "127.0.0.0/8,::1/128"
      # FORGEJO__security__CSRF_COOKIE_HTTP_ONLY: "true"
      # FORGEJO__security__GLOBAL_TWO_FACTOR_REQUIREMENT: "none"  # none | all | admin
      # FORGEJO__security__DISABLE_QUERY_AUTH_TOKEN: "false"

      # -----------------------------------------------------------------------
      # [service] – Registration, email verification, captcha
      # -----------------------------------------------------------------------
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      # FORGEJO__service__REGISTER_EMAIL_CONFIRM: "false"
      # FORGEJO__service__REGISTER_MANUAL_CONFIRM: "false"
      # FORGEJO__service__REQUIRE_SIGNIN_VIEW: "false"
      # FORGEJO__service__ENABLE_NOTIFY_MAIL: "false"
      # FORGEJO__service__ENABLE_BASIC_AUTHENTICATION: "true"
      # FORGEJO__service__ENABLE_CAPTCHA: "false"
      # FORGEJO__service__CAPTCHA_TYPE: "image"    # image | recaptcha | hcaptcha | mcaptcha | cfturnstile
      # FORGEJO__service__DEFAULT_KEEP_EMAIL_PRIVATE: "false"
      # FORGEJO__service__DEFAULT_ALLOW_CREATE_ORGANIZATION: "true"
      # FORGEJO__service__ENABLE_USER_HEATMAP: "true"
      # FORGEJO__service__ENABLE_TIMETRACKING: "true"
      # FORGEJO__service__DEFAULT_USER_VISIBILITY: "public"
      # FORGEJO__service__DEFAULT_ORG_VISIBILITY: "public"
      # FORGEJO__service__EMAIL_DOMAIN_ALLOWLIST: ""
      # FORGEJO__service__EMAIL_DOMAIN_BLOCKLIST: ""
      # FORGEJO__service__ALLOW_ONLY_INTERNAL_REGISTRATION: "false"

      # -----------------------------------------------------------------------
      # [mailer] – SMTP / sendmail (disabled by default)
      # -----------------------------------------------------------------------
      # FORGEJO__mailer__ENABLED: "false"
      # FORGEJO__mailer__PROTOCOL: "smtp"          # smtp | smtps | smtp+starttls | sendmail | dummy
      # FORGEJO__mailer__SMTP_ADDR: "smtp.example.com"
      # FORGEJO__mailer__SMTP_PORT: "587"
      # FORGEJO__mailer__USER: "forgejo@example.com"
      # FORGEJO__mailer__PASSWD: "smtp-password"
      # FORGEJO__mailer__FROM: "Forgejo <forgejo@example.com>"
      # FORGEJO__mailer__SUBJECT_PREFIX: ""
      # FORGEJO__mailer__FORCE_TRUST_SERVER_CERT: "false"
      # FORGEJO__mailer__SEND_AS_PLAIN_TEXT: "false"

      # -----------------------------------------------------------------------
      # [cache] – In-memory or Redis cache
      # -----------------------------------------------------------------------
      # FORGEJO__cache__ADAPTER: "memory"           # memory | redis | redis-cluster | twoqueue | memcache
      # FORGEJO__cache__INTERVAL: "60"
      # FORGEJO__cache__HOST: ""                    # redis://:password@127.0.0.1:6379/0
      # FORGEJO__cache__ITEM_TTL: "16h"

      # -----------------------------------------------------------------------
      # [session] – User sessions
      # -----------------------------------------------------------------------
      # FORGEJO__session__PROVIDER: "memory"         # memory | file | redis | db | mysql | postgres
      # FORGEJO__session__PROVIDER_CONFIG: "data/sessions"
      # FORGEJO__session__COOKIE_SECURE: ""          # defaults to true when ROOT_URL is https
      # FORGEJO__session__COOKIE_NAME: "session"
      # FORGEJO__session__SESSION_LIFE_TIME: "86400"
      # FORGEJO__session__GC_INTERVAL_TIME: "86400"
      # FORGEJO__session__SAME_SITE: "lax"           # strict | lax | none

      # -----------------------------------------------------------------------
      # [indexer] – Issue / code search
      # -----------------------------------------------------------------------
      # FORGEJO__indexer__ISSUE_INDEXER_TYPE: "bleve"     # bleve | db | elasticsearch | meilisearch
      # FORGEJO__indexer__ISSUE_INDEXER_PATH: "indexers/issues.bleve"
      # FORGEJO__indexer__REPO_INDEXER_ENABLED: "false"
      # FORGEJO__indexer__REPO_INDEXER_TYPE: "bleve"
      # FORGEJO__indexer__REPO_INDEXER_PATH: "indexers/repos.bleve"

      # -----------------------------------------------------------------------
      # [repository] – Repository defaults
      # -----------------------------------------------------------------------
      # FORGEJO__repository__DEFAULT_BRANCH: "main"
      # FORGEJO__repository__DEFAULT_PRIVATE: "last"       # last | private | public
      # FORGEJO__repository__FORCE_PRIVATE: "false"
      # FORGEJO__repository__DISABLE_HTTP_GIT: "false"
      # FORGEJO__repository__DISABLE_STARS: "false"
      # FORGEJO__repository__DISABLE_FORKS: "false"
      # FORGEJO__repository__DISABLE_MIGRATIONS: "false"
      # FORGEJO__repository__ENABLE_PUSH_CREATE_USER: "false"
      # FORGEJO__repository__ENABLE_PUSH_CREATE_ORG: "false"
      # FORGEJO__repository__MAX_CREATION_LIMIT: "-1"

      # -----------------------------------------------------------------------
      # [log] – Logging
      # -----------------------------------------------------------------------
      # FORGEJO__log__MODE: "console"    # console | file | conn (comma-separated)
      # FORGEJO__log__LEVEL: "Info"      # Trace | Debug | Info | Warn | Error | Critical | Fatal | None
      # FORGEJO__log__ROOT_PATH: ""

      # -----------------------------------------------------------------------
      # [webhook] – Outbound webhooks
      # -----------------------------------------------------------------------
      # FORGEJO__webhook__ALLOWED_HOST_LIST: "external"
      # FORGEJO__webhook__DELIVER_TIMEOUT: "5"
      # FORGEJO__webhook__SKIP_TLS_VERIFY: "false"

      # -----------------------------------------------------------------------
      # [oauth2] – Built-in OAuth2 provider
      # -----------------------------------------------------------------------
      # FORGEJO__oauth2__ENABLED: "true"
      # FORGEJO__oauth2__ACCESS_TOKEN_EXPIRATION_TIME: "3600"
      # FORGEJO__oauth2__REFRESH_TOKEN_EXPIRATION_TIME: "730"
      # FORGEJO__oauth2__JWT_SECRET: ""   # generate: forgejo generate secret JWT_SECRET

      # -----------------------------------------------------------------------
      # [openid] – OpenID authentication
      # -----------------------------------------------------------------------
      # FORGEJO__openid__ENABLE_OPENID_SIGNIN: "true"
      # FORGEJO__openid__ENABLE_OPENID_SIGNUP: "true"

      # -----------------------------------------------------------------------
      # [actions] – Forgejo Actions (CI/CD)
      # -----------------------------------------------------------------------
      FORGEJO__actions__ENABLED: "true"
      FORGEJO_ADMIN_USER: ${FORGEJO_ADMIN_USER:-"forgeadmin"}
      FORGEJO_ADMIN_PASSWORD: ${FORGEJO_ADMIN_PASSWORD:-"changeme-admin"}
      FORGEJO_ADMIN_EMAIL: ${FORGEJO_ADMIN_EMAIL:-"admin@localhost"}
      # FORGEJO__actions__DEFAULT_ACTIONS_URL: "https://data.forgejo.org"
      # FORGEJO__actions__ARTIFACT_RETENTION_DAYS: "90"
      # FORGEJO__actions__LOG_RETENTION_DAYS: "365"

      # -----------------------------------------------------------------------
      # [packages] – Package registry
      # -----------------------------------------------------------------------
      FORGEJO__packages__ENABLED: "true"
      # FORGEJO__packages__LIMIT_TOTAL_OWNER_COUNT: "-1"
      # FORGEJO__packages__LIMIT_TOTAL_OWNER_SIZE: "-1"

      # -----------------------------------------------------------------------
      # [lfs] – Git Large File Storage
      # -----------------------------------------------------------------------
      # FORGEJO__server__LFS_START_SERVER: "false"
      # FORGEJO__lfs__PATH: "data/lfs"

      # -----------------------------------------------------------------------
      # [metrics] – Prometheus metrics endpoint
      # -----------------------------------------------------------------------
      # FORGEJO__metrics__ENABLED:  docker-in-docker:
networks:
  forgejo:
    external: false
volumes:
  mariadb-sql:
  forgejo-data:
  mariadb-data:
